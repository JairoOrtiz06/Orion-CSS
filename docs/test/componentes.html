<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/scss/componentes.css">
    <title>Prueba de Componentes</title>
</head>

<body>

    <h1>VARIANTES DE BOTONES</h1>

    <!-- Botones principales -->
    <button class="btn btn-primary">Guardar</button>
    <button class="btn btn-success">Aceptar</button>
    <button class="btn btn-danger">Eliminar</button>
    <button class="btn btn-warning">Advertencia</button>

    <!-- Botones outline -->
    <button class="btn btn-outline-primary">Ver más</button>
    <button class="btn btn-outline-success">Confirmar</button>

    <!-- Tamaños -->
    <button class="btn btn-primary btn-sm">Pequeño</button>
    <button class="btn btn-primary">Mediano</button>
    <button class="btn btn-primary btn-lg">Grande</button>

    <!-- Estado -->
    <button class="btn btn-primary" disabled>Deshabilitado</button>

    <div>
        ..
    </div>


    <h1>PRUEBAS DE ALERTAS</h1>

    <div class="alert alert-success">
        Operación exitosa
        <span class="alert-close">&times;</span>
    </div>

    <div class="alert alert-danger">
        Ocurrió un error
    </div>

    <div class="alert alert-warning">
        Cuidado con esta acción
    </div>

    <div class="alert alert-info">
        Información importante
    </div>

    <h1>INSIGNIAS</h1>


    <p class="section-label">Redondeado</p>
    <div class="row">
        <span class="badge badge-primary">Beta</span>
        <span class="badge badge-success">Completado</span>
        <span class="badge badge-danger">Caido</span>
        <span class="badge badge-warning">Revision</span>
        <span class="badge badge-secondary">Solo Lectura</span>
    </div>

    <p class="section-label">Píldora</p>
    <div class="row">
        <span class="badge badge-pill badge-primary">Beta</span>
        <span class="badge badge-pill badge-success">Completado</span>
        <span class="badge badge-pill badge-danger">Caido</span>
        <span class="badge badge-pill badge-warning">Revision</span>
        <span class="badge badge-pill badge-secondary">Solo Lectura</span>
    </div>

</body>

</html>
